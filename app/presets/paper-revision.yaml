preset_mode: paper-revision
display_name: Paper Revision
description: Coordinate standards analysis, paper rewriting, and reviewer-style critique for academic papers.
agent_roles:
  - standards-editor
  - reviser
  - reviewer
execution_flow:
  - analyze-standards
  - revise
  - review
  - iterate
default_models:
