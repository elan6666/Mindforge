providers:
  - provider_id: openai
    display_name: OpenAI
    description: 用于规划和复杂内容推理的 GPT 系列模型。
    enabled: true
    api_base_url: https://api.openai.com/v1
  - provider_id: moonshot
    display_name: Moonshot AI
    description: 用于写作和文风辅助的 Kimi 系列模型。
    enabled: true
    api_base_url: https://api.moonshot.cn/v1
  - provider_id: zhipu
    display_name: Zhipu AI
    description: 用于审查和二次分析的 GLM 系列模型。
    enabled: true
    api_base_url: https://open.bigmodel.cn/api/paas/v4
  - provider_id: volces-ark
    display_name: Volces Ark
    description: 通过 Ark OpenAI-compatible coding endpoint 暴露的豆包模型。
    enabled: true
    api_base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    metadata:
      protocol: openai
      api_key_env: ARK_API_KEY
      anthropic_api_base_url: https://ark.cn-beijing.volces.com/api/coding

models:
  - model_id: doubao-seed-2.0-lite
    display_name: Doubao Seed 2.0 Lite
    provider_id: volces-ark
    upstream_model: doubao-seed-2.0-lite
    priority: high
    enabled: true
    supported_preset_modes:
      - default
      - code-engineering
      - code-review
      - doc-organize
      - paper-revision
    supported_task_types:
      - planning
      - writing
      - review
    supported_roles:
      - coordinator
      - project-manager
      - backend
      - frontend
      - reviewer
      - security-reviewer
      - documenter
      - editor
      - standards-editor
      - reviser
      - style-reviewer
      - content-reviewer
      - final-reviewer
  - model_id: gpt-5.4
    display_name: GPT-5.4
    provider_id: openai
    upstream_model: gpt-5.4
    priority: high
    enabled: true
    supported_preset_modes:
      - default
      - code-engineering
      - code-review
      - doc-organize
      - paper-revision
    supported_roles:
      - coordinator
      - project-manager
      - backend
      - standards-editor
      - reviser
  - model_id: kimi-2.5
    display_name: Kimi 2.5
    provider_id: moonshot
    upstream_model: kimi-k2-250711
    priority: medium
    enabled: true
    supported_preset_modes:
      - code-engineering
      - doc-organize
      - paper-revision
    supported_roles:
      - frontend
      - documenter
      - editor
      - reviser
      - style-reviewer
  - model_id: glm-5.1
    display_name: GLM 5.1
    provider_id: zhipu
    upstream_model: glm-5.1
    priority: medium
    enabled: true
    supported_preset_modes:
      - code-engineering
      - code-review
      - paper-revision
    supported_roles:
      - reviewer
      - security-reviewer
      - content-reviewer
      - final-reviewer

routing:
  default_model_id: gpt-5.4
  preset_defaults:
    default: gpt-5.4
    code-engineering: gpt-5.4
    code-review: glm-5.1
    doc-organize: kimi-2.5
    paper-revision: doubao-seed-2.0-lite
  task_type_defaults:
    planning: gpt-5.4
    review: glm-5.1
    writing: doubao-seed-2.0-lite
  role_defaults:
    code-engineering:
      project-manager: gpt-5.4
      backend: gpt-5.4
      frontend: kimi-2.5
      reviewer: glm-5.1
    code-review:
      reviewer: glm-5.1
      security-reviewer: glm-5.1
    doc-organize:
      documenter: kimi-2.5
      editor: kimi-2.5
    paper-revision:
      standards-editor: doubao-seed-2.0-lite
      reviser: doubao-seed-2.0-lite
      style-reviewer: doubao-seed-2.0-lite
      content-reviewer: doubao-seed-2.0-lite
      final-reviewer: doubao-seed-2.0-lite
